<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistem Informasi Akademik - SMP YP 17 Surabaya</title>
<link rel="icon" type="image/x-icon" href="../img/images.webp">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="navbar.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<body class="dashboard-body">

  <div class="dashboard-wrapper">
   <div id="navbar-container"></div>

    <main class="main-content">
      <header class="top-header">
        <div class="search-container">
          <input type="text" placeholder="Cari info akademik, tugas, atau jadwal..." />
        </div>
        <div class="user-info">
          <span class="notif-badge" id="namaKelas">-</span>
          <div class="user-profile-top">
            <div class="avatar-placeholder" id="avatarPlaceholder">-</div>
            <span class="user-name" id="namaSiswa">Memuat...</span>
          </div>
        </div>
      </header>

      <section class="profil-page">
  <div class="profil-banner">
    
    <div class="text">
      <h1>Profil Siswa</h1>
      <p>Halaman profil ini menampilkan detail informasi Anda.</p>
    </div>

    <div class="image">
      <img src="../img/siswa.webp" alt="ilustrasi">
    </div>

  </div>
</section>

        <div class="profil-content-box">
          <div class="profil-left">
            <div class="profil-photo-card">
              <div class="profil-photo-frame">
                <img
                  id="fotoProfil"
                  src="../img/default-profile.png"
                  alt="Foto Profil"
                  class="profil-photo-img"
                />
              </div>

              <button type="button" id="btnPilihFoto" class="btn-pilih-foto">
                Pilih Foto
              </button>

              <p id="uploadToast" class="upload-toast"></p>

              <input type="file" id="inputFoto" accept="image/*" hidden />
            </div>
          </div>

          <div class="profil-right">
            <div class="profil-grid">
              <div class="profil-col">
                <div class="profil-item">
                  <h4>Nama Lengkap</h4>
                  <p id="nama">-</p>
                </div>

                <div class="profil-item">
                  <h4>NIS / NISN</h4>
                  <p id="nisn">-</p>
                </div>

                <div class="profil-item">
                  <h4>Kelas</h4>
                  <p id="kelas">-</p>
                </div>

                <div class="profil-item">
                  <h4>Jenis Kelamin</h4>
                  <p id="jenisKelamin">-</p>
                </div>
              </div>

              <div class="profil-col">
                <div class="profil-item">
                  <h4>Email</h4>
                  <p id="email">-</p>
                </div>

                <div class="profil-item">
                  <h4>No HP</h4>
                  <p id="noHp">-</p>
                </div>

                <div class="profil-item">
                  <h4>Alamat</h4>
                  <p id="alamat">-</p>
                </div>

                <div class="profil-item">
                  <h4>Tanggal Lahir</h4>
                  <p id="tanggalLahir">-</p>
                </div>
              </div>
            </div>

            <div class="profil-readonly-bar">
              Data profil hanya bisa dilihat oleh siswa.
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>



    <script src="navbar.js"></script>
  <script type="module" src="profil-siswa.js"></script>

  
</body>
</html>
