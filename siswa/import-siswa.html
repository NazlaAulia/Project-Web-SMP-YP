    const btn = document.getElementById("btnImport");

    function log(text) {
      logEl.textContent += text + "\n";
    }

    async function importCollection() {
  log("Mulai import siswa...");

  for (const item of dataList) {
    const docId = String(item["id_siswa"]);

    const siswaData = {
      ...item,
      nis: item.nis || item.nisn || "",
      email: item.email || "",
      no_hp: item.no_hp || "",
      foto_profil: item.foto_profil || "",
      kelas: item.kelas || ""
    };

    await setDoc(doc(db, "siswa", docId), siswaData);
    log("- siswa/" + docId + " berhasil");
  }

  log("Selesai import siswa.");
}

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      statusEl.textContent = "Sedang import siswa...";
      logEl.textContent = "";

      try {
        await importCollection();
        statusEl.textContent = "Import siswa selesai 🎉";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Import siswa gagal: " + error.message;
        log("ERROR: " + error.message);
      } finally {
        btn.disabled = false;
      }
    });
