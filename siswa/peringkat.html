<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sistem Informasi Akademik - SMP YP 17 Surabaya</title>

  <link rel="icon" type="image/x-icon" href="../img/images.webp">

  <link rel="stylesheet" href="peringkat.css">
  <link rel="stylesheet" href="navbar.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

  <div id="navbar-container"></div>

  <main class="main-content">
    <div class="header">
      <input type="text" placeholder="Cari info akademik, tugas, atau jadwal...">

      <div class="profile-top">
        <div class="kelas-badge" id="kelasText">-</div>
        <div class="profile-avatar" id="avatarText">-</div>
        <div class="profile-name-wrap">
          <div class="profile" id="namaText">Loading...</div>
        </div>
      </div>
    </div>

    <section class="card fade-in">

      <div class="peringkat-banner">
        <div class="peringkat-banner-text">
          <h2>Peringkat & Prestasi Siswa</h2>
          <p>Pantau pencapaian akademikmu dan tetap semangat berkompetisi secara sehat!</p>
        </div>

        <div class="peringkat-banner-img">
          <img src="../img/siswa.webp" alt="Banner Peringkat">
        </div>
      </div>

      <div class="stats">
        <div class="box">
          Peringkat Saat Ini<br>
          <strong id="peringkatSaatIni">#-</strong><br>
          <span id="kelasCard">Kelas -</span>
        </div>

        <div class="box nilai-box">
          Nilai Rata-Rata<br>
          <strong id="nilaiRataRata">-</strong>
        </div>
      </div>

      <div class="peringkat-filter-wrap">
        <div class="filter-group">
          <label for="semester">Tahun Ajaran/Semester</label>
          <select id="semester">
            <option selected>2025/2026 - Genap</option>
            <option>2025/2026 - Ganjil</option>
          </select>
        </div>
      </div>

      <h3 class="table-title">Tabel Peringkat Lengkap</h3>

      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Nama Siswa</th>
              <th>Kelas</th>
              <th>Nilai Rata-Rata</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody id="tableBody"></tbody>
        </table>
      </div>

    </section>
  </main>

</div>

<script src="navbar.js"></script>
<script src="peringkat.js"></script>

</body>
</html>
