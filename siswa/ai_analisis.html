<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>AI Analisis Belajar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f7f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h2 {
            color: #064e4b;
        }
        .mapel-badge {
            display: inline-block;
            background: #e8f3f2;
            padding: 8px 14px;
            border-radius: 40px;
            margin: 5px;
            font-size: 13px;
        }
        .lowest {
            background: #fee2e2;
            color: #991b1b;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #064e4b;
        }
        .ai-response {
            background: #f9fafb;
            border-left: 5px solid #064e4b;
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .refresh-btn {
            background: #064e4b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 14px;
        }
        .error-box {
            background: #fee2e2;
            border-left: 5px solid #dc2626;
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
            color: #991b1b;
        }
        .success-note {
            background: #dcfce7;
            border-left: 5px solid #16a34a;
            padding: 10px 15px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 12px;
            color: #166534;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🤖 Analisis Belajar AI</h2>
        <p>AI akan menganalisis nilai belajarmu dan memberikan saran untuk meningkatkan prestasi.</p>
        
        <div id="nilaiRingkasan" style="margin: 20px 0; min-height: 100px;">
            <div class="loading">⏳ Memuat data nilai...</div>
        </div>
        
        <div id="aiResponse" class="loading">
            ⏳ Sedang menganalisis data nilai...
        </div>
        
        <button class="refresh-btn" id="refreshBtn">🔄 Analisis Ulang</button>
    </div>

    <script>
        function loadAnalisis(forceRefresh = false) {
            document.getElementById('nilaiRingkasan').innerHTML = '<div class="loading">⏳ Memuat data nilai...</div>';
            document.getElementById('aiResponse').innerHTML = '<div class="loading">⏳ Sedang menganalisis data nilai...</div>';
            
            const url = forceRefresh ? 'get_analisis_ai.php?refresh=1&t=' + Date.now() : 'get_analisis_ai.php?t=' + Date.now();
            
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(data => {
                    console.log('Response:', data);
                    
                    if (data.success) {
                        // Ringkasan nilai
                        if (data.data.semua_nilai && data.data.semua_nilai.length > 0) {
                            let html = '<strong>📊 Rata-rata Nilai per Mapel:</strong><br><div style="margin-top: 10px;">';
                            data.data.semua_nilai.forEach(mapel => {
                                let cls = mapel.rata_rata < 75 ? 'lowest' : '';
                                html += `<span class="mapel-badge ${cls}">${mapel.nama_mapel}: ${mapel.rata_rata}</span>`;
                            });
                            html += '</div>';
                            html += `<p style="margin-top: 15px;"><strong>⚠️ Mapel terendah:</strong> ${data.data.mapel_terendah} (${data.data.nilai_terendah})</p>`;
                            document.getElementById('nilaiRingkasan').innerHTML = html;
                        } else {
                            document.getElementById('nilaiRingkasan').innerHTML = '<p>❌ Tidak ada data nilai</p>';
                        }
                        
                        // Response AI
                        let aiHtml = (data.data.ai_response || 'Tidak ada respons').replace(/\n/g, '<br>');
                        if (data.data.note) {
                            aiHtml += `<div class="success-note">ℹ️ ${data.data.note}</div>`;
                        }
                        document.getElementById('aiResponse').innerHTML = `<div class="ai-response">${aiHtml}</div>`;
                    } else {
                        document.getElementById('nilaiRingkasan').innerHTML = '<p>❌ Gagal memuat data</p>';
                        document.getElementById('aiResponse').innerHTML = `<div class="error-box">❌ ${data.message || 'Terjadi kesalahan'}</div>`;
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    document.getElementById('aiResponse').innerHTML = `<div class="error-box">❌ Error: ${err.message}</div>`;
                });
        }
        
        document.getElementById('refreshBtn').addEventListener('click', () => loadAnalisis(true));
        loadAnalisis();
    </script>
</body>
</html>
