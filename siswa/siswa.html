<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistem Informasi Akademik - SMP YP 17 Surabaya</title>
<link rel="icon" type="image/x-icon" href="../img/images.webp">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="navbar.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="dashboard-body">

  <div class="dashboard-wrapper">
    <div id="navbar-container"></div>

    <main class="main-content">
      <header class="top-header">
        <div class="search-container">
          <input type="text" placeholder="Cari info akademik, tugas, atau jadwal..." />
        </div>

        <div class="user-info">
          <span class="notif-badge" id="namaKelas">-</span>
          <div class="user-profile-top">
            <div class="avatar-placeholder" id="avatarPlaceholder">-</div>
            <span class="user-name" id="namaSiswa">Memuat...</span>
          </div>
        </div>
      </header>

      <section class="banner-welcome">
        <div class="banner-content">
          <h1 id="welcomeText">Halo, Siswa!</h1>
          <p>Selamat datang di dashboard siswa. Semangat belajar hari ini!</p>
        </div>

        <div class="banner-image-wrap">
          <img src="../img/siswa.webp" alt="Study" class="banner-img" />
        </div>
      </section>

      <div class="dashboard-grid">
        <div class="card chart-card">
          <div class="card-header">
            <h3>Performa Akademik</h3>
            <span class="year-label">Tahun Ini</span>
          </div>

          <div class="bar-chart" id="barChart"></div>

          <div class="academic-summary">
            <div class="summary-box">
              <h4>Rata-rata</h4>
              <p id="avgValue">0</p>
            </div>
            <div class="summary-box">
              <h4>Tertinggi</h4>
              <p id="maxValue">-</p>
            </div>
            <div class="summary-box">
              <h4>Terendah</h4>
              <p id="minValue">-</p>
            </div>
          </div>
        </div>

        <div class="right-column">
          <div class="card schedule-card">
            <div class="card-header">
              <h3>Jadwal Hari Ini</h3>
              <span class="day-label">Hari Ini</span>
            </div>

            <div id="jadwalHariIniContainer">
              <p class="schedule-empty">Memuat jadwal...</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>


<script src="navbar.js"></script>
<script type="module" src="siswa.js"></script>

 
</body>
</html>
