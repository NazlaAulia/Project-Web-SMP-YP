<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Guru - Admin</title>

    <link rel="stylesheet" href="components/admin-nav.css">
<link rel="stylesheet" href="fiturguru.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
       <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="guru">

    <div class="container">
        <div id="admin-nav-root"></div>

        <main class="main-content">
            <div class="page-wrap">
                <header class="page-header">
                    <div>
                        <h1>Data Guru</h1>
                        <p>Kelola data guru, akun login dibuat otomatis oleh sistem.</p>
                    </div>

                    <button class="btn-primary" id="openModalBtn">
                        <i class="fas fa-plus"></i>
                        Tambah Guru
                    </button>
                </header>

                <section class="toolbar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchGuru" placeholder="Cari nama, email, username, NIP...">
                    </div>
                </section>

               <section class="table-card">
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Email</th>
                    <th>Username</th>
                    <th>NIP</th>
                    <th>Pelajaran</th>
                    <th>Wali Kelas</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="guruTableBody">
                <tr>
                    <td colspan="7" class="empty-cell">Memuat data guru...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination-container">
        <div class="pagination-info" id="paginationInfo">
            Menampilkan 1 sampai 10 dari 0 Guru
        </div>
        <div class="pagination-btns" id="paginationBtns"></div>
    </div>
</section>
    <script src="components/admin-nav.js"></script>
    <script src="fiturguru.js"></script>
</body>
</html>
