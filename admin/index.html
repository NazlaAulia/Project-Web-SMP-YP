<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - School Prime</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="indexstyle.css">

    <link rel="stylesheet" href="components/admin-nav.css">
</head>
<body data-page="dashboard">

    <div class="container">
        <div id="admin-nav-root"></div>

        <main class="main-content">
            <header>
                <div class="search-container-elegant">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" placeholder="Cari data guru atau siswa..." class="search-input">
                </div>

                <div class="user-profile">
                    <span>Selamat Datang, <strong id="namaAdmin">Admin</strong></span>
                    <div class="initial" id="avatarAdmin">A</div>
                </div>
            </header>

            <section class="admin-stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: #e0f2f1; color: #064e4b;">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <div class="stat-info">
                        <h3 class="counter" data-target="124">0</h3>
                        <p>Total Guru</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon" style="background: #e3f2fd; color: #1e88e5;">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <div class="stat-info">
                        <h3 class="counter" data-target="1240">0</h3>
                        <p>Total Siswa</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon" style="background: #fff3e0; color: #fb8c00;">
                        <i class="fas fa-school"></i>
                    </div>
                    <div class="stat-info">
                        <h3 class="counter" data-target="42">0</h3>
                        <p>Total Kelas</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon" style="background: #fce4ec; color: #d81b60;">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-info">
                        <h3 class="counter" data-target="8">0</h3>
                        <p>Pending</p>
                    </div>
                </div>
            </section>

            <div class="grid-layout">
                <div class="left-column">
                    <div class="card action-card">
                        <h3><i class="fas fa-exclamation-circle"></i> Perlu Ditindak</h3>

                        <div class="action-item">
                            <span>Pendaftaran Siswa Baru (Verifikasi)</span>
                            <span class="badge status-now" id="pendingPendaftaran">0 Siswa</span>
                        </div>

                        <div class="action-item">
                            <span>Ganti Jadwal Menunggu Approval</span>
                            <span class="badge status-pending" id="pendingJadwal">0 Request</span>
                        </div>
                    </div>

                    <div class="card">
                        <h3><i class="fas fa-bolt"></i> Aksi Cepat</h3>
                        <div class="shortcut-grid">
                            <button class="btn-shortcut">
                                <i class="fas fa-plus"></i>
                                <span>Guru</span>
                            </button>
                            <button class="btn-shortcut">
                                <i class="fas fa-calendar-plus"></i>
                                <span>Jadwal</span>
                            </button>
                            <button class="btn-shortcut">
                                <i class="fas fa-bullhorn"></i>
                                <span>Info</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="right-column">
                    <div class="card calendar-only-card">
                        <h3><i class="fas fa-calendar-alt"></i> Kalender</h3>

                        <div class="calendar-card">
                            <div class="calendar-header">
                                <button id="prevMonth" class="cal-btn" type="button">
                                    <i class="fas fa-chevron-left"></i>
                                </button>

                                <span id="month-year">Bulan Tahun</span>

                                <button id="nextMonth" class="cal-btn" type="button">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>

                            <div class="calendar-days">
                                <div>Sen</div>
                                <div>Sel</div>
                                <div>Rab</div>
                                <div>Kam</div>
                                <div>Jum</div>
                                <div>Sab</div>
                                <div>Min</div>
                            </div>

                            <div id="calendar-body" class="calendar-grid"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

<script src="components/admin-nav.js"></script>
    <script src="java.js"></script>
</body>
</html>
