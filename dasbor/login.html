<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAKAD - SMP YP 17 Surabaya</title>
    <link rel="stylesheet" href="login.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="img/logo.webp" alt="Logo SMP YP 17">
                <h2>Login SIAKAD</h2>
                <p>Silahkan masuk ke akun Anda</p>
            </div>

            <form action="#">
                <div class="input-field has-dropdown">
    <i class="fas fa-users-cog"></i>
    <select class="select-role" required>
        <option value="" disabled selected>Pilih Peran</option>
        <option value="admin">Administrator</option>
        <option value="guru">Guru / Karyawan</option>
        <option value="siswa">Siswa</option>
    </select>
</div>

                <div class="input-group">
                    <label>Username / NISN</label>
                    <div class="input-field">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="Masukkan username" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Masukkan password" required>
                    </div>
                </div>

                <div class="login-options">
                    <label><input type="checkbox"> Ingat Saya</label>
                    <a href="#" class="forgot-pass">Lupa Password?</a>
                </div>

                <button type="submit" class="btn-login">MASUK SEKARANG</button>
            </form>

            <a href="index.html" class="back-home">
                <i class="fas fa-arrow-left"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

</body>
</html>
