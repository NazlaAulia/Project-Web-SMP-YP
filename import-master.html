<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import Master Firebase</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      background: #f5f7f8;
    }
    .box {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    button {
      background: #07484a;
      color: white;
      border: none;
      padding: 14px 18px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #06393b;
    }
    pre {
      background: #f0f3f5;
      padding: 14px;
      border-radius: 10px;
      overflow: auto;
      font-size: 13px;
    }
    #status {
      margin-top: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Import Data Master ke Firebase</h2>
    <p>Ini buat import: role, tahun_ajaran, mapel, kelas.</p>

    <button id="btnImport">Import Sekarang</button>
    <div id="status">Belum dijalankan.</div>
    <pre id="log"></pre>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
       apiKey: "AIzaSyBT5dv7OzGuTuwXZDvwbyqITZ4M-KaF1kY",
  authDomain: "smpyp17.firebaseapp.com",
  databaseURL: "https://smpyp17-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "smpyp17",
  storageBucket: "smpyp17.firebasestorage.app",
  messagingSenderId: "74715637846",
  appId: "1:74715637846:web:2e3ed5dc6bf4079aa1b3f7",
  measurementId: "G-NEKTB23085"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const roleData = [
      { id_role: 1, nama_role: "admin" },
      { id_role: 2, nama_role: "guru" },
      { id_role: 3, nama_role: "siswa" }
    ];

    const tahunAjaranData = [
      { id_tahun_ajaran: 1, tahun_ajaran: "2025/2026", status: "aktif" },
      { id_tahun_ajaran: 2, tahun_ajaran: "2026/2027", status: "nonaktif" }
    ];

    const mapelData = [
      { id_mapel: 1, nama_mapel: "BIN" },
      { id_mapel: 2, nama_mapel: "B. JAWA" },
      { id_mapel: 3, nama_mapel: "PKN" },
      { id_mapel: 4, nama_mapel: "INFOR" },
      { id_mapel: 5, nama_mapel: "MAT" },
      { id_mapel: 6, nama_mapel: "BIG" },
      { id_mapel: 7, nama_mapel: "IPA" },
      { id_mapel: 8, nama_mapel: "IPS" },
      { id_mapel: 9, nama_mapel: "BK" },
      { id_mapel: 10, nama_mapel: "INFO/BK" },
      { id_mapel: 11, nama_mapel: "PAI/BHQ" },
      { id_mapel: 12, nama_mapel: "PJOK" }
    ];

    const kelasData = [
      { id_kelas: 1, nama_kelas: "7A", tingkat: 7, id_wali_kelas: 25 },
      { id_kelas: 2, nama_kelas: "7B", tingkat: 7, id_wali_kelas: 26 },
      { id_kelas: 3, nama_kelas: "7C", tingkat: 7, id_wali_kelas: 27 },
      { id_kelas: 9, nama_kelas: "8A", tingkat: 8, id_wali_kelas: 23 },
      { id_kelas: 10, nama_kelas: "8B", tingkat: 8, id_wali_kelas: 31 },
      { id_kelas: 11, nama_kelas: "8C", tingkat: 8, id_wali_kelas: 32 },
      { id_kelas: 18, nama_kelas: "9A", tingkat: 9, id_wali_kelas: 7 },
      { id_kelas: 19, nama_kelas: "9B", tingkat: 9, id_wali_kelas: 4 },
      { id_kelas: 20, nama_kelas: "9C", tingkat: 9, id_wali_kelas: 3 }
    ];

    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const btn = document.getElementById("btnImport");

    function log(text) {
      logEl.textContent += text + "\n";
    }

    async function importCollection(collectionName, idField, dataList) {
      log(`Mulai import ${collectionName}...`);
      for (const item of dataList) {
        const docId = String(item[idField]);
        await setDoc(doc(db, collectionName, docId), item);
        log(`- ${collectionName}/${docId} berhasil`);
      }
      log(`Selesai import ${collectionName}\n`);
    }

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      statusEl.textContent = "Sedang import data master...";
      logEl.textContent = "";

      try {
        await importCollection("role", "id_role", roleData);
        await importCollection("tahun_ajaran", "id_tahun_ajaran", tahunAjaranData);
        await importCollection("mapel", "id_mapel", mapelData);
        await importCollection("kelas", "id_kelas", kelasData);

        statusEl.textContent = "Import selesai 🎉";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Import gagal: " + error.message;
        log("ERROR: " + error.message);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
