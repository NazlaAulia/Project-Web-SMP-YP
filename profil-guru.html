<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Informasi Akademik - SMP YP 17 Surabaya</title>
<link rel="icon" type="image/x-icon" href="img/images.webp">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="components/include.css">
<link rel="stylesheet" href="profil-guru.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
<div id="navbar-container"></div>

<section class="guru-hero">
    <div class="container">
        <span class="guru-badge-top">TENAGA PENDIDIK</span>
        <h1>Profil Guru SMP YP 17 Surabaya</h1>
        <p>
            Kenali para guru kami yang berdedikasi dalam mendampingi siswa
            untuk tumbuh, belajar, dan berprestasi.
        </p>
    </div>
</section>

<section class="guru-page-section">
    <div class="container">
        <div class="guru-page-head">
            <h2>Daftar Guru</h2>
            <p>Data guru</p>
        </div>

        <div class="guru-grid" id="guruGrid">
            <div class="guru-loading">Memuat data guru...</div>
        </div>
    </div>
</section>

<div id="footer-container"></div>

<a href="#" class="back-to-top"><i class="fas fa-chevron-up"></i></a>

<script src="components/include.js"></script>
<script src="components/navbar.js"></script>
<script src="./script.js" defer></script>

<script>
const guruGrid = document.getElementById("guruGrid");

async function loadGuru() {
    try {
        const response = await fetch("get_guru.php");
        const guruList = await response.json();

        if (!guruList || guruList.length === 0) {
            guruGrid.innerHTML = `<div class="guru-empty">Belum ada data guru.</div>`;
            return;
        }

        guruList.sort((a, b) => (a.nama || "").localeCompare(b.nama || ""));

        guruGrid.innerHTML = guruList.map((guru) => {
            const namaGuru = guru.nama || "Guru";
            const inisial = namaGuru.charAt(0).toUpperCase();

            const namaMapel = guru.nama_mapel
                ? guru.nama_mapel
                : "Wali Kelas / Umum";

            return `
                <div class="guru-card">
                    <div class="guru-card-top"></div>
                    <div class="guru-photo-wrap">
                        <div class="guru-inisial">${inisial}</div>
                    </div>
                    <div class="guru-card-body">
                        <h3>${namaGuru}</h3>
                        <p class="guru-mapel">${namaMapel}</p>

                        <div class="guru-info-footer">
                            <div class="nip-badge">
                                <i class="fas fa-id-card"></i>
                                <span>NIP: ${guru.nip || "-"}</span>
                            </div>

                            <div class="nip-badge">
                                <i class="fas fa-envelope"></i>
                                <span>${guru.email || "-"}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join("");

    } catch (error) {
        console.error(error);
        guruGrid.innerHTML = `<div class="guru-error">Gagal memuat data guru dari database.</div>`;
    }
}

loadGuru();
</script>
</body>
</html>
