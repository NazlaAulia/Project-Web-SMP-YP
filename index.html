<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Sekolah</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Sistem Informasi Akademik</h1>
    <div class="login-btn">
        <button>Login Guru</button>
        <button>Login Siswa</button>
    </div>
</header>

<!-- SLIDER -->
<div class="slider">
    <img class="slide active" src="img1.jpg">
    <img class="slide" src="img2.jpg">
    <img class="slide" src="img3.jpg">
</div>

<!-- STATISTIK -->
<section class="stats">

<div class="card">
<h2>50+</h2>
<p>Guru</p>
</div>

<div class="card">
<h2>600+</h2>
<p>Siswa</p>
</div>

<div class="card">
<h2>20</h2>
<p>Fasilitas</p>
</div>

</section>

<!-- PENGUMUMAN -->
<section class="pengumuman">

<h2>Pengumuman</h2>

<div class="item">
Ujian Semester dimulai tanggal 10 Juni
</div>

<div class="item">
Libur nasional tanggal 1 Mei
</div>

</section>

<!-- KEGIATAN -->
<section class="kegiatan">

<h2>Kegiatan Sekolah</h2>

<div class="galeri">

<img src="kegiatan1.jpg">
<img src="kegiatan2.jpg">
<img src="kegiatan3.jpg">

</div>

</section>

<script src="script.js"></script>

</body>
</html>
