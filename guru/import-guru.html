    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const btn = document.getElementById("btnImport");

    function log(text) {
      logEl.textContent += text + "\n";
    }

    async function importCollection() {
      log("Mulai import guru...");
      for (const item of dataList) {
        const docId = String(item["id_guru"]);
        await setDoc(doc(db, "guru", docId), item);
        log("- guru/" + docId + " berhasil");
      }
      log("Selesai import guru.");
    }

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      statusEl.textContent = "Sedang import guru...";
      logEl.textContent = "";

      try {
        await importCollection();
        statusEl.textContent = "Import guru selesai 🎉";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Import guru gagal: " + error.message;
        log("ERROR: " + error.message);
      } finally {
        btn.disabled = false;
