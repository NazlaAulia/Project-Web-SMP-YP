<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Mengajar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="jadwalmengajar.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-container-elegant" style="padding-bottom: 20px;">
                <img src="../img/logo.webp">
            </div>
            <nav class="nav-menu">
                <a href="guru.html" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard Guru</a>
                <a href="#" class="nav-link active"><i class="bi bi-calendar-event"></i> Jadwal Mengajar</a>
                <a href="#" class="nav-link"><i class="bi bi-journal-text"></i> Nilai</a>
                <a href="#" class="nav-link"><i class="bi bi-person-check"></i> Kehadiran</a>
                <a href="#" class="nav-link"><i class="bi bi-trophy"></i> Peringkat</a>
                <a href="#" class="nav-link"><i class="bi bi-arrow-left-right"></i> Ganti Jadwal</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="header-title">
                    <h1>Jadwal Mengajar ✨</h1>
                    <p>Tahun Ajaran 2025/2026 - Semester Genap</p>
                </div>
                <button class="btn-request" onclick="openRequestModal()">
                    <i class="bi bi-plus-circle"></i> Ajukan Ganti Jadwal
                </button>
            </header>

            <section class="filter-section">
                <div class="filter-group">
                    <label><i class="bi bi-filter"></i> Filter Hari</label>
                    <select id="filterHari" onchange="filterData()">
                        <option value="Semua">Semua Hari</option>
                        <option value="Senin">Senin</option>
                        <option value="Selasa">Selasa</option>
                        <option value="Rabu">Rabu</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="bi bi-building"></i> Kelas</label>
                    <select id="filterKelas" onchange="filterData()">
                        <option value="Semua">Semua Kelas</option>
                        <option value="9A">Kelas 9A</option>
                        <option value="9B">Kelas 9B</option>
                        <option value="9C">Kelas 9C</option>
                    </select>
                </div>
            </section>

            <div class="schedule-grid" id="scheduleContainer">
                </div>
        </main>
    </div>
    <script src="jadwal.js"></script>
</body>
</html>
