<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Mengajar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="jadwalmengajar.css">
    <link rel="stylesheet" href="sidebar.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="content-header">
                <div class="header-title">
                    <h1>Jadwal Mengajar ✨</h1>
                    <p>Tahun Ajaran 2025/2026 - Semester Genap</p>
                </div>
                <button class="btn-request" onclick="openRequestModal()">
                    <i class="bi bi-plus-circle"></i> Ajukan Ganti Jadwal
                </button>
            </header>

            <section class="filter-section">
                <div class="filter-group">
                    <label><i class="bi bi-filter"></i> Filter Hari</label>
                    <select id="filterHari" onchange="filterData()">
                        <option value="Semua">Semua Hari</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="bi bi-building"></i> Kelas</label>
                    <select id="filterKelas" onchange="filterData()">
                        <option value="Semua">Semua Kelas</option>
                    </select>
                </div>
            </section>

            <section>
                <h2 style="margin-bottom: 18px;">Jadwal Aktif</h2>
                <div class="schedule-grid" id="scheduleContainer"></div>
            </section>

            <section style="margin-top: 40px;">
                <h2 style="margin-bottom: 18px;">Riwayat Pengajuan Ganti Jadwal</h2>
                <div id="requestContainer"></div>
            </section>
        </main>
    </div>

    <!-- Modal Request -->
    <div id="requestModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Ajukan Ganti Jadwal</h3>
            <form id="requestForm">
                <div class="filter-group">
                    <label>Pilih Jadwal</label>
                    <select id="id_jadwal" name="id_jadwal" required></select>
                </div>

                <div class="filter-group">
                    <label>Hari Baru</label>
                    <input type="text" id="hari_baru" name="hari_baru" placeholder="Contoh: Kamis" required>
                </div>

                <div class="filter-group">
                    <label>Jam Baru</label>
                    <input type="text" id="jam_baru" name="jam_baru" placeholder="Contoh: 08.00 - 09.30" required>
                </div>

                <div class="filter-group">
                    <label>Alasan</label>
                    <textarea id="alasan" name="alasan" rows="4" required></textarea>
                </div>

                <div style="display:flex; gap:10px; margin-top:16px;">
                    <button type="submit" class="btn-request">Kirim Request</button>
                    <button type="button" class="btn-request" onclick="closeRequestModal()">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script src="components/sidebar-guru.js"></script>
    <script src="jadwal.js"></script>
</body>
</html>
