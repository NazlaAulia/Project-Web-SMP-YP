<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Mengajar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="jadwalmengajar.css">
    <link rel="stylesheet" href="components/sidebar.css">
    <link rel="stylesheet" href="components/fix-mobile.css">
</head>
<body>
        <div class="app-container">
            <div id="sidebar-container"></div>

            <button class="mobile-menu-btn" id="mobileMenuBtn" type="button">
                <i class="bi bi-list"></i>
            </button>

            <div class="sidebar-overlay" id="sidebarOverlay"></div>

            <main class="main-content">
                <header class="content-header">
                    <div class="header-title">
                        <h1>Jadwal Mengajar</h1>
                        <p>Tahun Ajaran 2025/2026 - Semester Genap</p>
                    </div>
                </header>

                <section class="filter-section">
                    <div class="filter-group">
                        <label><i class="bi bi-filter"></i> Filter Hari</label>
                        <select id="filterHari" onchange="filterData()">
                            <option value="Semua">Semua Hari</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label><i class="bi bi-building"></i> Kelas</label>
                        <select id="filterKelas" onchange="filterData()">
                            <option value="Semua">Semua Kelas</option>
                        </select>
                    </div>
                </section>

                <section>
                    <h2 style="margin-bottom: 18px;">Jadwal Aktif</h2>
                    <div class="schedule-grid" id="scheduleContainer"></div>
                </section>

            </main>
        </div>
            </form>
        </div>
    </div>

    <div class="request-popup-overlay" id="requestPopup">
    <div class="request-popup-card">
        <button type="button" class="request-popup-close" onclick="tutupPopupPengajuan()">
            <i class="bi bi-x"></i>
        </button>

        <div class="request-popup-icon">
            <i class="bi bi-calendar2-week"></i>
        </div>

        <h3>Pengajuan Ganti Jadwal</h3>
        <p>Tulis alasan pengajuan ganti jadwal terlebih dahulu.</p>

        <div class="request-popup-field">
            <label for="alasanPengajuan">Alasan Pengajuan</label>
            <textarea
                id="alasanPengajuan"
                placeholder="Contoh: Bentrok dengan kegiatan sekolah..."
            ></textarea>
            <small id="alasanError"></small>
        </div>

        <div class="request-popup-actions">
            <button type="button" class="btn-popup-cancel" onclick="tutupPopupPengajuan()">
                Batal
            </button>
            <button type="button" class="btn-popup-submit" onclick="kirimPengajuanJadwal()">
                <i class="bi bi-send"></i>
                Kirim Pengajuan
            </button>
        </div>
    </div>
</div>

<div class="success-popup-overlay" id="successPopup">
    <div class="success-popup-card">
        <div class="success-check">
            <i class="bi bi-check-lg"></i>
        </div>

        <h3>Pengajuan Berhasil Dikirim</h3>
        <p>Pengajuan ganti jadwal kamu sudah tercatat.</p>

        <button type="button" onclick="tutupPopupBerhasil()">
            Oke
        </button>
    </div>
</div>

    <script src="components/sidebar-guru.js"></script>
    <script src="jadwalmengajar.js"></script>
</body>
</html>
