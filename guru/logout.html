<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konfirmasi Logout</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="logout.css?v=10">
</head>
<body>
  <main class="logout-page">
    <section class="logout-card">
      <div class="logout-header">
        <div class="school-brand">
          <div class="school-logo-frame">
            <img src="../img/logo.webp" alt="Logo Sekolah" class="school-logo">
          </div>
          <div class="school-text">
            <h2>SMP YP 17 Surabaya</h2>
            <p>Sistem Informasi Akademik</p>
          </div>
        </div>
      </div>

      <div class="logout-body">
        <div class="logout-badge">Konfirmasi Logout</div>

        <h1>
          Apakah Anda yakin ingin
          <span>keluar akun?</span>
        </h1>

        <p class="logout-desc">
          Anda akan keluar dari dasbor guru.
        </p>

        <div class="logout-actions">
          <a href="guru.html" class="btn-cancel">Batal</a>
          <a href="#" class="btn-logout" id="btnLogout">Logout</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const btnLogout = document.getElementById("btnLogout");

    if (btnLogout) {
      btnLogout.addEventListener("click", function () {
        localStorage.removeItem("id_guru");
        localStorage.removeItem("role_id");
        localStorage.removeItem("username");
        localStorage.removeItem("id_siswa");
        localStorage.removeItem("id_user");
      });
    }
  </script>
</body>
</html>
