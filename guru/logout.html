<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logout</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="components/sidebar.css">
  <link rel="stylesheet" href="logout.css">
</head>
<body>
  <div class="app-container">
    <div id="sidebar-container"></div>

    <button class="mobile-menu-btn" id="mobileMenuBtn" type="button">
      <i class="bi bi-list"></i>
    </button>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <div class="logout-wrapper">
        <div class="logout-card">
          <div class="logout-icon">
            <i class="bi bi-box-arrow-right"></i>
          </div>

          <h1>Keluar dari Akun?</h1>
          <p>
            Kamu akan keluar dari dashboard guru. Pastikan semua perubahan sudah disimpan sebelum logout.
          </p>

          <div class="logout-actions">
            <a href="guru.html" class="btn-secondary">
              <i class="bi bi-arrow-left"></i>
              Batal
            </a>

            <a href="../index.html" class="btn-danger">
              <i class="bi bi-check2-circle"></i>
              Ya, Logout
            </a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="components/sidebar-guru.js"></script>
</body>
</html>
