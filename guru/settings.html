<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Guru</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Sidebar CSS -->
    <link rel="stylesheet" href="components/sidebar.css">

    <!-- CSS Halaman -->
    <link rel="stylesheet" href="settings.css">
</head>
<body>

<div class="app-container">
    
    <!-- SIDEBAR COMPONENT -->
    <div id="sidebar-container"></div>

    <!-- MAIN -->
    <main class="main-content">

        <header class="content-header">
            <h1><i class="bi bi-gear"></i> Settings</h1>
            <p>Pengaturan akun dan preferensi</p>
        </header>

        <!-- PROFILE SETTINGS -->
        <section class="card">
            <h3>Profil Guru</h3>

            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" value="Bapak/Ibu Guru">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" value="guru@email.com">
            </div>

            <div class="form-group">
                <label>No HP</label>
                <input type="text" value="08123456789">
            </div>

            <button class="btn-save">Simpan Perubahan</button>
        </section>

        <!-- PASSWORD -->
        <section class="card">
            <h3>Ganti Password</h3>

            <div class="form-group">
                <label>Password Lama</label>
                <input type="password">
            </div>

            <div class="form-group">
                <label>Password Baru</label>
                <input type="password">
            </div>

            <div class="form-group">
                <label>Konfirmasi Password</label>
                <input type="password">
            </div>

            <button class="btn-save">Update Password</button>
        </section>

        <!-- PREFERENSI -->
        <section class="card">
            <h3>Preferensi</h3>

            <div class="toggle-group">
                <label>
                    <input type="checkbox" checked>
                    Notifikasi Email
                </label>

                <label>
                    <input type="checkbox">
                    Mode Gelap
                </label>
            </div>
        </section>

    </main>
</div>

<script src="components/sidebar-guru.js"></script>

</body>
</html>
