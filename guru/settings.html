<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Guru</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Sidebar CSS -->
    <link rel="stylesheet" href="components/sidebar.css">

    <!-- CSS Halaman -->
    <link rel="stylesheet" href="settings.css">
</head>
<body>

<div class="app-container">
        <aside class="sidebar">
        <div>
            <div class="logo-container-elegant" style="padding-bottom: 20px;">
            <img src="../img/logo.webp" alt="Logo Sekolah">
            </div>

            <nav class="sidebar-menu">
            <a href="guru.html" class="nav-link" data-page="guru.html">
                <i class="bi bi-grid-fill"></i>
                <span>Dashboard Guru</span>
            </a>

            <a href="jadwalmengajar.html" class="nav-link" data-page="jadwalmengajar.html">
                <i class="bi bi-calendar-event"></i>
                <span>Jadwal Mengajar</span>
            </a>

            <a href="nilai.html" class="nav-link" data-page="nilai.html">
                <i class="bi bi-journal-text"></i>
                <span>Nilai</span>
            </a>

            <a href="kehadiran.html" class="nav-link" data-page="kehadiran.html">
                <i class="bi bi-person-check"></i>
                <span>Kehadiran</span>
            </a>

            <a href="peringkat.html" class="nav-link" data-page="peringkat.html">
                <i class="bi bi-trophy"></i>
                <span>Peringkat</span>
            </a>
            <a href="profilguru.html" class="nav-link" data-page="profilguru.html">
                <i class="bi bi-person-circle"></i>
                <span>Profil Guru</span>
            </a>
            <a href="settings.html" class="nav-link" data-page="settingsguru.html">
                <i class="bi bi-gear"></i>
                <span>Settings</span>
            </a>
            </nav>
        </div>

        <div class="sidebar-bottom">
            <a href="logout.html" class="nav-link logout-link" data-page="logout.html">
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
            </a>
        </div>
        </aside>

    <!-- MAIN -->
    <main class="main-content">

        <header class="content-header">
            <h1><i class="bi bi-gear"></i> Settings</h1>
            <p>Pengaturan akun dan preferensi</p>
        </header>

        <!-- PROFILE SETTINGS -->
        <section class="card">
            <h3>Profil Guru</h3>

            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" value="Bapak/Ibu Guru">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" value="guru@email.com">
            </div>

            <div class="form-group">
                <label>No HP</label>
                <input type="text" value="08123456789">
            </div>

            <button class="btn-save">Simpan Perubahan</button>
        </section>

        <!-- PASSWORD -->
        <section class="card">
            <h3>Ganti Password</h3>

            <div class="form-group">
                <label>Password Lama</label>
                <input type="password">
            </div>

            <div class="form-group">
                <label>Password Baru</label>
                <input type="password">
            </div>

            <div class="form-group">
                <label>Konfirmasi Password</label>
                <input type="password">
            </div>

            <button class="btn-save">Update Password</button>
        </section>

        <!-- PREFERENSI -->
        <section class="card">
            <h3>Preferensi</h3>

            <div class="toggle-group">
                <label>
                    <input type="checkbox" checked>
                    Notifikasi Email
                </label>

                <label>
                    <input type="checkbox">
                    Mode Gelap
                </label>
            </div>
        </section>

    </main>
</div>

<script src="components/sidebar-guru.js"></script>

</body>
</html>
