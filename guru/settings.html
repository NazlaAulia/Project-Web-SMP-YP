<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Guru</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="settings.css">
<link rel="stylesheet" href="components/sidebar.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebar-container"></div>

        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button">
            <i class="bi bi-list"></i>
        </button>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1>Pengaturan</h1>
                    <p>Kelola username, password, dan keamanan akun guru</p>
                </div>
            </header>

            <section class="card">
                <h3>Ganti Username</h3>

                <div class="form-group">
                    <label>Username Lama</label>
                    <input type="text" value="guru" readonly>
                </div>

                <div class="form-group">
                    <label>Username Baru</label>
                    <input type="text" placeholder="Masukkan username baru">
                </div>

                <button class="btn-save">Simpan Username</button>
            </section>

            <section class="card">
                <h3>Ganti Password</h3>

                <div class="form-group">
                    <label>Password Lama</label>
                    <input type="password" placeholder="Masukkan password lama">
                </div>

                <div class="form-group">
                    <label>Password Baru</label>
                    <input type="password" placeholder="Masukkan password baru">
                </div>

                <div class="form-group">
                    <label>Konfirmasi Password Baru</label>
                    <input type="password" placeholder="Ulangi password baru">
                </div>

                <button class="btn-save">Update Password</button>
            </section>
        </main>
    </div>

    <script src="components/sidebar-guru.js"></script>
    <script src="settings.js"></script>
</body>
</html>
