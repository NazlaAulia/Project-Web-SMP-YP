<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Guru</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Sidebar CSS -->
    <link rel="stylesheet" href="components/sidebar.css">

    <!-- CSS Halaman -->
    <link rel="stylesheet" href="settings.css">
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div>
            <div class="logo-container-elegant" style="padding-bottom: 20px;">
                <img src="../img/logo.webp" alt="Logo Sekolah">
            </div>

            <nav class="sidebar-menu">
                <a href="guru.html" class="nav-link" data-page="guru.html">
                    <i class="bi bi-grid-fill"></i>
                    <span>Dashboard Guru</span>
                </a>

                <a href="jadwalmengajar.html" class="nav-link" data-page="jadwalmengajar.html">
                    <i class="bi bi-calendar-event"></i>
                    <span>Jadwal Mengajar</span>
                </a>

                <a href="nilai.html" class="nav-link" data-page="nilai.html">
                    <i class="bi bi-journal-text"></i>
                    <span>Nilai</span>
                </a>

                <a href="kehadiran.html" class="nav-link" data-page="kehadiran.html">
                    <i class="bi bi-person-check"></i>
                    <span>Kehadiran</span>
                </a>

                <a href="peringkat.html" class="nav-link" data-page="peringkat.html">
                    <i class="bi bi-trophy"></i>
                    <span>Peringkat</span>
                </a>

                <a href="profilguru.html" class="nav-link" data-page="profilguru.html">
                    <i class="bi bi-person-circle"></i>
                    <span>Profil Guru</span>
                </a>

                <a href="settings.html" class="nav-link" data-page="settingsguru.html">
                    <i class="bi bi-gear"></i>
                    <span>Pengaturan</span>
                </a>
            </nav>
        </div>

        <div class="sidebar-bottom">
            <a href="logout.html" class="nav-link logout-link" data-page="logout.html">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <!-- ACCOUNT SETTINGS -->
        <section class="card">
            <h3>Ganti Username</h3>

            <div class="form-group">
                <label>Username Lama</label>
                <input type="text" value="guru" readonly>
            </div>

            <div class="form-group">
                <label>Username Baru</label>
                <input type="text" placeholder="Masukkan username baru">
            </div>

            <button class="btn-save">Simpan Username</button>
        </section>

        <!-- PASSWORD SETTINGS -->
        <section class="card">
            <h3>Ganti Password</h3>

            <div class="form-group">
                <label>Password Lama</label>
                <input type="password" placeholder="Masukkan password lama">
            </div>

            <div class="form-group">
                <label>Password Baru</label>
                <input type="password" placeholder="Masukkan password baru">
            </div>

            <div class="form-group">
                <label>Konfirmasi Password Baru</label>
                <input type="password" placeholder="Ulangi password baru">
            </div>

            <button class="btn-save">Update Password</button>
        </section>

    </main>
</div>

<script src="components/sidebar-guru.js"></script>

</body>
</html>
